name: E2E Tests

on:
  push:
    branches: [master, migration]
  pull_request:
    branches: [master]
  workflow_dispatch:

jobs:
  e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Laravel environment
        run: |
          cp docker/.env.docker .env
          # Inject NetrunnerDB OAuth credentials from secrets
          sed -i "s/NETRUNNERDB_CLIENT_ID=.*/NETRUNNERDB_CLIENT_ID=${{ secrets.NETRUNNERDB_CLIENT_ID }}/" .env
          sed -i "s/NETRUNNERDB_CLIENT_SECRET=.*/NETRUNNERDB_CLIENT_SECRET=${{ secrets.NETRUNNERDB_CLIENT_SECRET }}/" .env
          # Verify secrets are set
          if grep -q "NETRUNNERDB_CLIENT_SECRET=ASK_NECRO" .env || grep -q "NETRUNNERDB_CLIENT_SECRET=$" .env; then
            echo "::error::NETRUNNERDB_CLIENT_SECRET GitHub secret is not set!"
            exit 1
          fi
          echo "Laravel environment configured with OAuth secrets"

      # Cache Composer dependencies
      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      # Cache root node_modules (for gulp build)
      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-root-${{ hashFiles('package-lock.json') }}
          restore-keys: node-root-

      # Cache Docker layers
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ hashFiles('docker/Dockerfile.php', 'docker/Dockerfile.node') }}
          restore-keys: docker-

      - name: Build Docker images
        run: |
          docker compose build --build-arg BUILDKIT_INLINE_CACHE=1

      - name: Start Docker services
        run: |
          docker compose up -d php nginx mysql
          echo "Waiting for MySQL to be healthy..."
          timeout 120 bash -c 'until docker compose exec -T mysql mysqladmin ping -h localhost -u root -prootsecret --silent; do sleep 2; done'
          echo "MySQL is ready"

      - name: Install Composer dependencies
        run: docker compose exec -T php composer install --no-interaction --prefer-dist

      - name: Run database migrations
        run: docker compose exec -T php php artisan migrate --force

      - name: Load test seed data
        run: docker compose exec -T mysql mysql -u root -prootsecret netrunner < e2e/fixtures/test-seed.sql

      - name: Build frontend assets
        run: docker compose run --rm node

      - name: Debug environment
        run: |
          echo "=== Checking .env file (without secrets) ==="
          docker compose exec -T php cat .env | grep -v PASSWORD | grep -v SECRET | grep -v KEY
          echo "=== Testing artisan ==="
          docker compose exec -T php php artisan --version || echo "Artisan failed"
          echo "=== Testing route list ==="
          docker compose exec -T php php artisan route:list --path=oauth2 2>&1 | head -20 || echo "Route list failed"

      - name: Verify app is running
        run: |
          echo "Testing homepage..."
          HTTP_CODE=$(curl -s -o /tmp/response.html -w "%{http_code}" http://localhost:8000/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Homepage returned HTTP $HTTP_CODE"
            echo "=== Response body ==="
            cat /tmp/response.html | head -100
            echo "=== Nginx error log ==="
            docker compose exec -T nginx cat /var/log/nginx/error.log 2>/dev/null | tail -20 || echo "No nginx error log"
            echo "=== PHP-FPM logs ==="
            docker compose logs php --tail=50
            echo "=== Laravel logs ==="
            docker compose exec -T php cat storage/logs/laravel.log 2>/dev/null | tail -100 || echo "No Laravel logs"
            echo "=== PHP error test ==="
            docker compose exec -T php php -r "require 'vendor/autoload.php'; echo 'Autoload OK\n';" 2>&1 || echo "PHP autoload failed"
            exit 1
          fi
          echo "Homepage OK"
          echo "Testing OAuth redirect endpoint..."
          REDIRECT_URL=$(curl -s -o /dev/null -w "%{redirect_url}" http://localhost:8000/oauth2/redirect)
          echo "Redirect URL: $REDIRECT_URL"
          if [ -z "$REDIRECT_URL" ]; then
            echo "OAuth redirect not working! Checking logs..."
            docker compose exec -T php cat storage/logs/laravel.log 2>/dev/null | tail -50 || echo "No Laravel logs"
            exit 1
          fi

      # Setup Node.js for e2e tests
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Cache e2e node_modules
      - name: Cache e2e node_modules
        uses: actions/cache@v4
        with:
          path: e2e/node_modules
          key: node-e2e-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: node-e2e-

      - name: Install e2e dependencies
        working-directory: e2e
        run: npm ci

      # Cache Playwright browsers
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('e2e/package-lock.json') }}
          restore-keys: playwright-

      - name: Install Playwright Chromium
        working-directory: e2e
        run: npx playwright install chromium

      - name: Setup e2e credentials
        working-directory: e2e
        run: |
          cat > .env << EOF
          REGULAR_USERNAME=${{ secrets.E2E_REGULAR_USERNAME }}
          REGULAR_PASSWORD=${{ secrets.E2E_REGULAR_PASSWORD }}
          ADMIN_USERNAME=${{ secrets.E2E_ADMIN_USERNAME }}
          ADMIN_PASSWORD=${{ secrets.E2E_ADMIN_PASSWORD }}
          EOF

      - name: Run E2E tests
        working-directory: e2e
        run: npm test
        env:
          CHROME_PATH: ''

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results
          path: e2e/.auth/
          retention-days: 7

      - name: Stop Docker services
        if: always()
        run: docker compose down -v
