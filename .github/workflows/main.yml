name: Tests

on:
  push:
    branches: [master, migration]
  pull_request:
    branches: [master, migration]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    services:
      mysql:
        image: mariadb:10.5
        env:
          MYSQL_DATABASE: netrunner
          MYSQL_USER: abr
          MYSQL_PASSWORD: secret
          MYSQL_ROOT_PASSWORD: rootsecret
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -u root -prootsecret --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, fileinfo, intl, gd, pdo_mysql, bcmath, curl, zip
          coverage: none
          tools: composer:v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            tests/package-lock.json

      - name: Setup Laravel environment
        run: |
          cp .example.env .env
          sed -i "s/^DB_HOST=.*/DB_HOST=127.0.0.1/" .env
          sed -i "s/^DB_PORT=.*/DB_PORT=3307/" .env
          sed -i "s/^DB_DATABASE=.*/DB_DATABASE=netrunner/" .env
          sed -i "s/^DB_USERNAME=.*/DB_USERNAME=abr/" .env
          sed -i "s/^DB_PASSWORD=.*/DB_PASSWORD=secret/" .env
          sed -i "s/NETRUNNERDB_CLIENT_ID=.*/NETRUNNERDB_CLIENT_ID=${{ secrets.NETRUNNERDB_CLIENT_ID }}/" .env
          sed -i "s/NETRUNNERDB_CLIENT_SECRET=.*/NETRUNNERDB_CLIENT_SECRET=${{ secrets.NETRUNNERDB_CLIENT_SECRET }}/" .env
          sed -i "s/GOOGLE_MAPS_API=.*/GOOGLE_MAPS_API=${{ secrets.GOOGLE_MAPS_API }}/" .env
          sed -i "s/GOOGLE_FRONTEND_API=.*/GOOGLE_FRONTEND_API=${{ secrets.GOOGLE_FRONTEND_API }}/" .env
          if grep -q "NETRUNNERDB_CLIENT_SECRET=ASK_NECRO" .env || grep -q "NETRUNNERDB_CLIENT_SECRET=$" .env; then
            echo "::error::NETRUNNERDB_CLIENT_SECRET GitHub secret is not set!"
            exit 1
          fi

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-vendor-${{ runner.os }}-php82-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-vendor-${{ runner.os }}-php82-

      - name: Cache Composer download cache
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache
          key: composer-cache-${{ runner.os }}-php82-${{ hashFiles('composer.lock') }}
          restore-keys: |
            composer-cache-${{ runner.os }}-php82-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Build frontend assets
        run: |
          npm ci
          npm run build
          [ -f public/build/manifest.json ] || (echo "::error::public/build/manifest.json was not generated" && exit 1)

      - name: Ensure MySQL client is available
        run: |
          if ! command -v mysql >/dev/null 2>&1; then
            sudo apt-get update
            sudo apt-get install -y mariadb-client
          fi

      - name: Wait for MySQL and run migrations
        run: |
          timeout 120 bash -c 'until mysqladmin ping -h 127.0.0.1 -P 3307 -u root -prootsecret --silent; do sleep 2; done'
          php artisan migrate --force

      - name: Load test seed data
        run: gunzip -c tests/e2e/fixtures/test-seed.sql.gz | mysql -h 127.0.0.1 -P 3307 -u root -prootsecret netrunner

      - name: Update tournament dates for tests
        run: |
          FUTURE_DATE=$(date -d "+30 days" +%Y.%m.%d.)
          NEXT_WEEK=$(date -d "+7 days" +%Y.%m.%d.)
          NEXT_MONTH=$(date -d "+60 days" +%Y.%m.%d.)
          mysql -h 127.0.0.1 -P 3307 -u root -prootsecret netrunner -e "
            UPDATE tournaments SET date = '$FUTURE_DATE' WHERE id IN (886, 2850, 3264);
            UPDATE tournaments SET date = '$NEXT_WEEK' WHERE id IN (5313, 5354, 5400, 5500);
            UPDATE tournaments SET date = '$NEXT_MONTH' WHERE id IN (5600, 5700, 5800);
            UPDATE tournaments SET featured = 1 WHERE concluded = 1 AND approved = 1 LIMIT 3;
          "

      - name: Clear Laravel caches and set permissions
        run: |
          php artisan config:clear
          php artisan cache:clear
          php artisan view:clear
          chmod -R 775 storage bootstrap/cache

      - name: Start Laravel server
        run: |
          php artisan serve --host=127.0.0.1 --port=8000 >/tmp/laravel-server.log 2>&1 &
          echo $! >/tmp/laravel-server.pid

      - name: Verify app and API are running
        run: |
          timeout 60 bash -c 'until curl -s --max-time 5 -o /dev/null http://127.0.0.1:8000/; do sleep 2; done'
          HTTP_CODE=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Homepage returned HTTP $HTTP_CODE"
            exit 1
          fi
          API_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" http://127.0.0.1:8000/api/tournaments/upcoming)
          if [ "$API_CODE" != "200" ]; then
            echo "::error::API endpoint returned HTTP $API_CODE"
            exit 1
          fi

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('tests/package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Chromium
        working-directory: tests
        run: npx playwright install chromium

      - name: Setup e2e credentials
        working-directory: tests/e2e
        run: |
          cat > .env << EOF
          REGULAR_USERNAME=${{ secrets.E2E_REGULAR_USERNAME }}
          REGULAR_PASSWORD=${{ secrets.E2E_REGULAR_PASSWORD }}
          ADMIN_USERNAME=${{ secrets.E2E_ADMIN_USERNAME }}
          ADMIN_PASSWORD=${{ secrets.E2E_ADMIN_PASSWORD }}
          GOOGLE_MAPS_API=${{ secrets.GOOGLE_MAPS_API }}
          GOOGLE_FRONTEND_API=${{ secrets.GOOGLE_FRONTEND_API }}
          EOF

      - name: Create test artifacts directory
        run: mkdir -p tests/e2e/test-results tests/api/test-results

      # Run API tests first (faster)
      - name: Run API tests
        id: api-tests
        working-directory: tests
        continue-on-error: true
        run: npm run test:api

      # Run E2E tests second
      - name: Run E2E tests
        id: e2e-tests
        working-directory: tests
        continue-on-error: true
        run: npm run test:e2e
        env:
          CHROME_PATH: ''

      - name: Capture failure info
        if: always()
        run: |
          curl -s http://127.0.0.1:8000/ -o tests/e2e/test-results/homepage-final.html 2>/dev/null || true
          curl -s http://127.0.0.1:8000/api/tournaments/upcoming -o tests/e2e/test-results/api-upcoming.json 2>/dev/null || true
          cp /tmp/laravel-server.log tests/e2e/test-results/laravel-server.log 2>/dev/null || true

      - name: Summarize test results
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.api-tests.outcome }}" == "success" ]; then
            echo "✅ **API tests**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **API tests**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.e2e-tests.outcome }}" == "success" ]; then
            echo "✅ **E2E tests**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **E2E tests**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload API test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: tests/api/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload E2E test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: tests/e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop Laravel server
        if: always()
        run: |
          if [ -f /tmp/laravel-server.pid ]; then
            kill "$(cat /tmp/laravel-server.pid)" 2>/dev/null || true
          fi

      - name: Check test results
        if: steps.api-tests.outcome == 'failure' || steps.e2e-tests.outcome == 'failure'
        run: |
          echo "One or more test suites failed"
          exit 1
