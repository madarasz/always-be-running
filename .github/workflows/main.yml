name: Tests

on:
  push:
    branches: [master, migration]
  pull_request:
    branches: [master, migration]
  workflow_dispatch:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Laravel environment
        run: |
          cp docker/.env.docker .env
          sed -i "s/NETRUNNERDB_CLIENT_ID=.*/NETRUNNERDB_CLIENT_ID=${{ secrets.NETRUNNERDB_CLIENT_ID }}/" .env
          sed -i "s/NETRUNNERDB_CLIENT_SECRET=.*/NETRUNNERDB_CLIENT_SECRET=${{ secrets.NETRUNNERDB_CLIENT_SECRET }}/" .env
          sed -i "s/GOOGLE_MAPS_API=.*/GOOGLE_MAPS_API=${{ secrets.GOOGLE_MAPS_API }}/" .env
          sed -i "s/GOOGLE_FRONTEND_API=.*/GOOGLE_FRONTEND_API=${{ secrets.GOOGLE_FRONTEND_API }}/" .env
          if grep -q "NETRUNNERDB_CLIENT_SECRET=ASK_NECRO" .env || grep -q "NETRUNNERDB_CLIENT_SECRET=$" .env; then
            echo "::error::NETRUNNERDB_CLIENT_SECRET GitHub secret is not set!"
            exit 1
          fi

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Cache root node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: node-root-${{ hashFiles('package-lock.json') }}
          restore-keys: node-root-

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache Docker layers
        uses: actions/cache@v4
        with:
          path: /tmp/.buildx-cache
          key: docker-${{ hashFiles('docker/Dockerfile.php', 'docker/Dockerfile.node') }}
          restore-keys: docker-

      - name: Build Docker images
        run: docker compose build --build-arg BUILDKIT_INLINE_CACHE=1

      - name: Build Node image for gulp
        run: docker compose --profile build build node

      - name: Start Docker services
        run: |
          docker compose up -d php nginx mysql
          echo "Waiting for MySQL to be healthy..."
          timeout 120 bash -c 'until docker compose exec -T mysql mysqladmin ping -h localhost -u root -prootsecret --silent; do sleep 2; done'
          echo "MySQL is ready"

      - name: Install Composer dependencies
        run: docker compose exec -T php composer install --no-interaction --prefer-dist

      - name: Clear Laravel caches and set permissions
        run: |
          docker compose exec -T php php artisan config:clear
          docker compose exec -T php php artisan cache:clear
          docker compose exec -T php php artisan view:clear
          docker compose exec -T php chmod -R 777 storage bootstrap/cache

      - name: Run database migrations
        run: docker compose exec -T php php artisan migrate --force

      - name: Load test seed data
        run: |
          gunzip -c tests/e2e/fixtures/test-seed.sql.gz | docker compose exec -T mysql mysql -u root -prootsecret netrunner

      - name: Update tournament dates for tests
        run: |
          FUTURE_DATE=$(date -d "+30 days" +%Y.%m.%d.)
          NEXT_WEEK=$(date -d "+7 days" +%Y.%m.%d.)
          NEXT_MONTH=$(date -d "+60 days" +%Y.%m.%d.)
          docker compose exec -T mysql mysql -u root -prootsecret netrunner -e "
            UPDATE tournaments SET date = '$FUTURE_DATE' WHERE id IN (886, 2850, 3264);
            UPDATE tournaments SET date = '$NEXT_WEEK' WHERE id IN (5313, 5354, 5400, 5500);
            UPDATE tournaments SET date = '$NEXT_MONTH' WHERE id IN (5600, 5700, 5800);
            UPDATE tournaments SET featured = 1 WHERE concluded = 1 AND approved = 1 LIMIT 3;
          "

      - name: Build frontend assets
        run: |
          docker compose --profile build run --rm node sh -lc "
            set -e
            npm install

            # Mirror legacy Elixir copy steps so fresh CI checkouts have vendor files.
            mkdir -p public/fonts public/img public/vue public/css resources/assets/js resources/assets/css
            cp -R resources/assets/fonts/. public/fonts/
            cp -R resources/assets/img/. public/img/
            cp -R resources/assets/favicons/. public/
            cp -R resources/assets/vue/. public/vue/
            cp -R node_modules/bootstrap-sass/assets/fonts/. public/fonts/
            cp node_modules/bootstrap/dist/js/bootstrap.min.js resources/assets/js/
            cp node_modules/tether/dist/js/tether.js resources/assets/js/
            cp node_modules/jquery-bracket/dist/jquery.bracket.min.js resources/assets/js/
            cp node_modules/jquery-bracket/dist/jquery.bracket.min.css public/css/
            cp node_modules/timepicker/jquery.timepicker.min.css resources/assets/css/
            cp node_modules/timepicker/jquery.timepicker.min.js resources/assets/js/
            cp node_modules/vue/dist/vue.js resources/assets/js/
            cp node_modules/axios/dist/axios.min.js resources/assets/js/
            cp node_modules/toastr/build/toastr.min.css resources/assets/css/
            cp node_modules/toastr/build/toastr.min.js resources/assets/js/
            cp node_modules/marked/lib/marked.umd.js resources/assets/js/marked.js
            cp node_modules/v-autocomplete/dist/v-autocomplete.js resources/assets/js/
            cp node_modules/vue-lazyload/vue-lazyload.js resources/assets/js/

            gulp prepare-dirs
            gulp sass
            gulp scripts
            gulp styles
            gulp version
            gulp mix-manifest
          "
          echo "=== Build completed ==="
          echo "Contents of public/:"
          ls -la public/
          echo "Contents of public/build/:"
          ls -laR public/build/ 2>/dev/null || echo "public/build/ does not exist!"
          echo "Contents of public/css/:"
          ls -la public/css/ 2>/dev/null || echo "public/css/ does not exist!"
          echo "Contents of public/js/:"
          ls -la public/js/ 2>/dev/null || echo "public/js/ does not exist!"
          echo "mix-manifest.json:"
          cat public/mix-manifest.json 2>/dev/null || echo "mix-manifest.json does not exist!"
          [ -d public/build/css ] || (echo "::error::public/build/css was not generated" && exit 1)
          [ -d public/build/js ] || (echo "::error::public/build/js was not generated" && exit 1)
          [ -f public/mix-manifest.json ] || (echo "::error::public/mix-manifest.json was not generated" && exit 1)

      # Fix permissions for files created by node container (root) so php container can read them
      - name: Fix asset permissions
        run: |
          docker compose exec -T php chown -R www-data:www-data public/build public/mix-manifest.json 2>/dev/null || echo "Permission fix skipped"
          docker compose exec -T php chmod -R 755 public/build public/mix-manifest.json 2>/dev/null || echo "Permission fix skipped"

      - name: Verify app is running
        run: |
          HTTP_CODE=$(curl -s --max-time 30 -o /dev/null -w "%{http_code}" http://localhost:8000/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Homepage returned HTTP $HTTP_CODE"
            echo "=== PHP FPM logs ==="
            docker compose logs php --tail=50
            echo "=== Nginx logs ==="
            docker compose logs nginx --tail=30
            echo "=== Laravel storage logs ==="
            docker compose exec -T php cat storage/logs/laravel.log 2>/dev/null | tail -50 || echo "No Laravel logs"
            exit 1
          fi
          echo "Homepage OK (HTTP $HTTP_CODE)"
          API_CODE=$(curl -s --max-time 10 -o /dev/null -w "%{http_code}" http://localhost:8000/api/tournaments/upcoming)
          if [ "$API_CODE" != "200" ]; then
            echo "::error::API endpoint returned HTTP $API_CODE"
            docker compose logs php --tail=30
            exit 1
          fi
          echo "API endpoint OK (HTTP $API_CODE)"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache tests node_modules
        uses: actions/cache@v4
        with:
          path: tests/node_modules
          key: node-tests-${{ hashFiles('tests/package-lock.json') }}
          restore-keys: node-tests-

      - name: Install test dependencies
        working-directory: tests
        run: npm ci

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ hashFiles('tests/package-lock.json') }}
          restore-keys: playwright-

      - name: Install Playwright Chromium
        working-directory: tests
        run: npx playwright install chromium

      - name: Setup e2e credentials
        working-directory: tests/e2e
        run: |
          cat > .env << EOF
          REGULAR_USERNAME=${{ secrets.E2E_REGULAR_USERNAME }}
          REGULAR_PASSWORD=${{ secrets.E2E_REGULAR_PASSWORD }}
          ADMIN_USERNAME=${{ secrets.E2E_ADMIN_USERNAME }}
          ADMIN_PASSWORD=${{ secrets.E2E_ADMIN_PASSWORD }}
          GOOGLE_MAPS_API=${{ secrets.GOOGLE_MAPS_API }}
          GOOGLE_FRONTEND_API=${{ secrets.GOOGLE_FRONTEND_API }}
          EOF

      - name: Create test artifacts directory
        run: mkdir -p tests/e2e/test-results tests/api/test-results

      # Run API tests first (faster)
      - name: Run API tests
        id: api-tests
        working-directory: tests
        continue-on-error: true
        run: npm run test:api

      # Run E2E tests second
      - name: Run E2E tests
        id: e2e-tests
        working-directory: tests
        continue-on-error: true
        run: npm run test:e2e
        env:
          CHROME_PATH: ''

      - name: Capture failure info
        if: always()
        run: |
          curl -s http://localhost:8000/ -o tests/e2e/test-results/homepage-final.html 2>/dev/null || true
          curl -s http://localhost:8000/api/tournaments/upcoming -o tests/e2e/test-results/api-upcoming.json 2>/dev/null || true

      - name: Summarize test results
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.api-tests.outcome }}" == "success" ]; then
            echo "✅ **API tests**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **API tests**: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          if [ "${{ steps.e2e-tests.outcome }}" == "success" ]; then
            echo "✅ **E2E tests**: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ **E2E tests**: Failed" >> $GITHUB_STEP_SUMMARY
          fi

      - name: Upload API test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: api-test-results
          path: tests/api/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Upload E2E test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-test-results
          path: tests/e2e/test-results/
          retention-days: 7
          if-no-files-found: ignore

      - name: Stop Docker services
        if: always()
        run: docker compose down -v

      - name: Check test results
        if: steps.api-tests.outcome == 'failure' || steps.e2e-tests.outcome == 'failure'
        run: |
          echo "One or more test suites failed"
          exit 1
