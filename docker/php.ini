[PHP]
; Maximum upload file size
upload_max_filesize = 10M
post_max_size = 12M

; Maximum execution time
max_execution_time = 60

; Memory limit
memory_limit = 256M

; Keep deprecations/errors out of HTTP responses so JSON endpoints remain valid
display_errors = Off
display_startup_errors = Off
log_errors = On
error_reporting = E_ALL

; Date timezone
date.timezone = UTC
